name: Reusable Go Security

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go version to use"
        required: false
        type: string
        # 1.26.5 で crypto/tls の GO-2026-5856 (ECH プライバシーリーク) が修正。
        # 1.26.4 では govulncheck が本コードへの影響を検出し exit 3 で監査失敗する。
        default: "1.26.5"
      golangci-lint-version:
        description: "golangci-lint version"
        required: false
        type: string
        default: "v2.11.4"
      govulncheck-version:
        description: "govulncheck version"
        required: false
        type: string
        # v1.1.3 は Go 1.26 でビルド不可 (依存の x/tools@v0.23.0 が
        # tokeninternal でコンパイルエラー)。v1.6.0 は x/tools@v0.48.0 で正常。
        default: "v1.6.0"
      working-directory:
        description: "Working directory for lint/vulncheck (e.g. a nested Go module)"
        required: false
        type: string
        default: "."
      golangci-config:
        description: "Path to golangci-lint config, repo-relative (resolved against github.workspace)"
        required: false
        type: string
        default: ".golangci.yml"

jobs:
  go-security:
    name: Go Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version: ${{ inputs.go-version }}

      # golangci-lint v2 fails on relative ../ config paths under --path-mode=abs,
      # so resolve the config against the workspace root here (github.workspace is
      # reliably available inside the workflow's own step context).
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a
        with:
          version: ${{ inputs.golangci-lint-version }}
          working-directory: ${{ inputs.working-directory }}
          args: --config=${{ github.workspace }}/${{ inputs.golangci-config }} ./...

      - name: Run govulncheck
        env:
          CGO_ENABLED: "0"
          GOVULNCHECK_VERSION: ${{ inputs.govulncheck-version }}
        working-directory: ${{ inputs.working-directory }}
        run: |
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          govulncheck ./...
