name: Reusable Python Security

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use"
        required: false
        type: string
        default: "3.13"
      bandit-target:
        description: "Directory or path for bandit to scan recursively"
        required: false
        type: string
        default: "src"

jobs:
  py-security:
    name: Python Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3

      - name: Set up Python
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pip-audit
        run: uv run pip-audit

      - name: Run bandit
        env:
          BANDIT_TARGET: ${{ inputs.bandit-target }}
        run: uv run bandit -r "$BANDIT_TARGET" -ll
