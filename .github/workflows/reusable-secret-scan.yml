name: Reusable Secret Scan

on:
  workflow_call:
    inputs:
      scan-tool:
        description: "Secret scanning tool (trivy or gitleaks)"
        required: false
        type: string
        default: "trivy"

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan (includes secrets)
        if: inputs.scan-tool == 'trivy'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: "fs"
          scan-ref: "."
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Run Gitleaks
        if: inputs.scan-tool == 'gitleaks'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
