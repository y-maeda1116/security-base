name: Reusable Secret Scan

on:
  workflow_call:
    inputs:
      scan-tool:
        description: "Secret scanning tool (trivy or gitleaks)"
        required: false
        type: string
        default: "trivy"

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan (includes secrets)
        if: inputs.scan-tool == 'trivy'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: "fs"
          scan-ref: "."
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Run Gitleaks
        if: inputs.scan-tool == 'gitleaks'
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
