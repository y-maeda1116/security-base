name: Reusable Secret Scan

on:
  workflow_call:
    inputs:
      scan-tool:
        description: "Secret scanning tool (trivy or gitleaks)"
        required: false
        type: string
        default: "trivy"

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan (includes secrets)
        if: inputs.scan-tool == 'trivy'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Run Gitleaks
        if: inputs.scan-tool == 'gitleaks'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
