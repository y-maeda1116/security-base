name: Reusable Secret Scan

on:
  workflow_call:
    inputs:
      scan-tool:
        description: "Scan tool to use (trivy, gitleaks, or both)"
        required: false
        type: string
        default: "both"

jobs:
  trivy-scan:
    name: Trivy Secret Scan
    runs-on: ubuntu-latest
    if: inputs.scan-tool == 'trivy' || inputs.scan-tool == 'both'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@b6643f29f1f5da54eea1f572758a0c00e38e3d64
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret

  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    if: inputs.scan-tool == 'gitleaks' || inputs.scan-tool == 'both'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
