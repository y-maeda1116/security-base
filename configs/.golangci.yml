version: "2"

run:
  timeout: 5m

linters:
  enable:
    - gosec
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104
    errcheck:
      check-type-assertions: true
      check-blank: true

# output: v2 デフォルト (colored-line-number, linter名・行番号表示) を使用。
# 旧リスト形式の formats は v2.11+ で 'output.formats expected a map' エラーになるため削除。

issues:
  exclude-rules:
    # テストのセットアップ/クリーンアップの errcheck は
    # テスト実行時の失敗で検知可能なため除外 (本番コードは厳格に検査)
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
