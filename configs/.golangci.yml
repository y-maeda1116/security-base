version: "2"

run:
  timeout: 5m

linters:
  enable:
    - gosec
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104
    errcheck:
      check-type-assertions: true
      check-blank: true

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
